input {
    kb_layout = us,ca
    kb_variant = ,multix
    numlock_by_default = false
    repeat_rate = 25
    repeat_delay = 500

    sensitivity = -0.7
    accel_profile = flat
    follow_mouse = 1

    touchpad {
        disable_while_typing = false
    }
}
device {
    name = synaptics-tm3149-002
    sensitivity = 0.5
    #accel_profile = adaptive
    accel_profile = flat
}
device {
    name = tpps/2-ibm-trackpoint
    sensitivity = 0.5
}
device {
    name = at-translated-set-2-keyboard
}

binds {
    disable_keybind_grabbing = false
    drag_threshold = 20
}

cursor {
    min_refresh_rate = 10
    hotspot_padding = 1
    no_warps = false
    hide_on_key_press = false
    warp_back_after_non_mouse_input = false
}

# remember to setup keybinds like hyprpicker here
# bind = SUPER, F10, pass, class:^(com\.obsproject\.Studio)$
# bind = SUPER_SHIFT, A, global, coolApp:myToggle

$terminal = kitty
$filemanager = thunar
$menu = rofi -show combi -modes combi -combi-modes "window,run,drun"
$browser = floorp
$screenshotpath = "$(xdg-user-dir PICTURES)/Copies d'écran/$(date +'%Y-%m-%d-%H%M%S-%3N_grim.png')"
$screenshotfolder = "$(xdg-user-dir PICTURES)/CopiesÉcran"
$imageviewer = ristretto

bind = SUPER, SPACE, exec, $menu
bind = SUPER, R, exec, $menu
bind = SUPER, RETURN, exec, $terminal
bind = SUPER, E, exec, $filemanager
bind = SUPER_ALT, F, exec, $browser
bind = SUPER, P, exec, hyprpicker -ar
bind = SUPER, C, killactive,
#bind = ALT, Q, killactive,

bind = SUPER, V, exec, clipvault list | rofi -dmenu -display-columns 2 | clipvault get | wl-copy
bind = SUPER, D, exec, swaync-client -t
bind = SUPER_ALT, F4, exec, hyprshutdown -t 'Shutting down...' --post-cmd 'systemctl suspend'
bind = SUPER, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

bind = SUPER_SHIFT, RETURN, togglefloating,
bind = SUPER, F, fullscreen, toggle

bind = , Print, exec, hyprshot -z -m region -o $screenshotfolder
bind = SHIFT, Print, exec, hyprshot -z -m active -m window -o $screenshotfolder
bind = CTRL, Print, exec, hyprshot -z -m active -o output $screenshotfolder
bind = SUPER, L, exec, hyprlock

bind = SUPER_SHIFT, SPACE, exec, hyprctl switchxkblayout all next

bind = SUPER_ALT, left, exec, playerctl previous
bind = SUPER_ALT, right, exec, playerctl next

bind = SUPER_SHIFT, up, movewindow, u
bind = SUPER_SHIFT, down, movewindow, d
bind = SUPER_SHIFT, left, movewindow, l
bind = SUPER_SHIFT, right, movewindow, r
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

bind = ALT, TAB, cyclenext, visible
bind = CTRL_ALT, TAB, cyclenext, visible prev
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

########## From wiki ##########
# Switch to a submap called `resize`.
bind = ALT, R, submap, resize

# Start a submap called "resize".
submap = resize

# Set repeatable binds for resizing the active window.
binde = , right, resizeactive, 10 0
binde = , left, resizeactive, -10 0
binde = , up, resizeactive, 0 -10
binde = , down, resizeactive, 0 10

# Use `reset` to go back to the global submap
bind = , escape, submap, reset

# Reset the submap, which will return to the global submap
submap = reset

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
#bind = $mainMod, Q, exec, $terminal
#bind = $mainMod, E, exec, $fileManager
#bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
#bind = $mainMod, J, layoutmsg, togglesplit # dwindle

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
#bind = $mainMod, S, togglespecialworkspace, magic
#bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
